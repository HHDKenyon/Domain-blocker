<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domain Blocker — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">🚫</span>
        <h1>Domain Blocker</h1>
      </div>
      <label class="toggle-label" title="Enable / disable blocking globally">
        <input type="checkbox" id="globalToggle" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-text" id="globalToggleText">Enabled</span>
      </label>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <h2>Block Groups</h2>
      <button id="addGroupBtn" class="btn btn-primary">+ New Group</button>
    </div>

    <div id="groupList" class="group-list">
      <!-- group cards rendered here -->
    </div>

    <!-- Group editor (shown when editing/creating a group) -->
    <div id="editor" class="editor hidden">
      <div class="editor-header">
        <h2 id="editorTitle">New Group</h2>
        <button id="editorCancel" class="btn btn-ghost">Cancel</button>
      </div>

      <div class="editor-body">

        <!-- Name + colour -->
        <div class="field-row">
          <label for="groupName">Group name</label>
          <input type="text" id="groupName" placeholder="e.g. Social Media" maxlength="60">
        </div>
        <div class="field-row">
          <label>Colour</label>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>

        <!-- Domains -->
        <div class="section-label">Domains</div>
        <p class="hint">One per line. Subdomains are matched automatically (e.g. <code>youtube.com</code> also blocks <code>www.youtube.com</code>).</p>
        <textarea id="domainList" rows="5" placeholder="youtube.com&#10;facebook.com&#10;twitter.com"></textarea>
        <p class="error hidden" id="domainError"></p>

        <!-- Schedules -->
        <div class="section-label">Schedules</div>
        <p class="hint">Each schedule defines a time window during which blocking applies.</p>
        <div id="scheduleList" class="schedule-list">
          <!-- schedule rows rendered here -->
        </div>
        <button id="addScheduleBtn" class="btn btn-ghost btn-sm">+ Add schedule</button>

      </div>

      <div class="editor-footer">
        <button id="saveGroupBtn" class="btn btn-primary">Save Group</button>
        <button id="deleteGroupBtn" class="btn btn-danger hidden">Delete Group</button>
      </div>
    </div>
  </main>

  <!-- Schedule row template (cloned in JS) -->
  <template id="scheduleTemplate">
    <div class="schedule-row" data-id="">
      <div class="schedule-row-top">
        <div class="day-pills">
          <button class="day-pill" data-day="1">M</button>
          <button class="day-pill" data-day="2">T</button>
          <button class="day-pill" data-day="3">W</button>
          <button class="day-pill" data-day="4">T</button>
          <button class="day-pill" data-day="5">F</button>
          <button class="day-pill" data-day="6">S</button>
          <button class="day-pill" data-day="0">S</button>
        </div>
        <button class="btn btn-ghost btn-icon delete-schedule" title="Remove schedule">✕</button>
      </div>
      <div class="schedule-row-times">
        <label>From <input type="time" class="time-start" value="09:00"></label>
        <span class="time-sep">→</span>
        <label>To <input type="time" class="time-end" value="17:00"></label>
      </div>
      <div class="schedule-row-type">
        <label class="radio-label">
          <input type="radio" name="" value="full" class="radio-full" checked> Full block
        </label>
        <label class="radio-label">
          <input type="radio" name="" value="timed" class="radio-timed"> Time-limited
        </label>
        <div class="time-limit-wrap hidden">
          <input type="number" class="time-limit-input" min="1" max="1440" value="30">
          <span>min per window</span>
        </div>
      </div>
    </div>
  </template>

  <script src="../vendor/browser-polyfill.js"></script>
  <script src="options.js"></script>
</body>
</html>
